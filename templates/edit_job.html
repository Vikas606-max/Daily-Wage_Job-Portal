<!DOCTYPE html>
<html>
<head>
  <title>Edit Job</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container">
    <h2>Edit Job Posting</h2>
    <form method="POST">
      <input type="text" name="title" value="{{ job['title'] }}" required>
      <textarea name="description" required>{{ job['description'] }}</textarea>
      <input type="text" name="salary" value="{{ job['salary'] }}">
      <input type="text" name="location" value="{{ job['location'] }}">
      <input type="text" name="qualifications" value="{{ job['qualifications'] }}">
      <select name="category" required>
        {% for cat in categories %}
          <option value="{{ cat }}" {% if job['category'] == cat %}selected{% endif %}>{{ cat }}</option>
        {% endfor %}
      </select>
      <button type="submit">Update Job</button>
    </form>
  </div>
</body>
</html>
