<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — JobConnect</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <!-- Top Navigation -->
  <header class="topbar">
    <div class="container">
      <div class="brand">
        <div class="logo">Job<span>Connect</span></div>
        <div class="subtitle">Login to Continue</div>
      </div>

      <nav class="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/signup" class="nav-link">Register</a>
      </nav>
    </div>
  </header>

  <!-- Authentication Area -->
  <main class="auth-area container">

    <div class="auth-card">
      <h2 class="auth-title">Welcome Back 👋</h2>
      <p class="auth-sub">Login to continue your journey</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form method="post" class="auth-form">

        <input type="email" name="email" placeholder="Email Address" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit" class="btn primary full">Login</button>

        <p class="switch-link">
          Don't have an account?
          <a href="/signup">Sign Up</a>
        </p>

      </form>
    </div>

  </main>

  <footer class="footer">
    <small>© 2025 JobConnect. All rights reserved.</small>
  </footer>

</body>
</html>
